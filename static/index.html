<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrawlerSE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 20px 40px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.3px;
        }

        h1 span { color: #666; font-weight: 400; }

        #searchForm {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        #searchBox {
            flex: 1;
            padding: 10px 14px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.15s;
        }

        #searchBox:focus { border-color: #888; }

        button {
            padding: 10px 18px;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            background: #fff;
            color: #1a1a1a;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        button:hover:not(:disabled) { background: #f0f0f0; border-color: #bbb; }
        button:disabled { opacity: 0.4; cursor: default; }

        #info {
            font-size: 13px;
            color: #888;
            margin-bottom: 24px;
            min-height: 18px;
        }

        .result {
            margin-bottom: 22px;
            line-height: 1.5;
        }

        .result a {
            color: #1a0dab;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            word-break: break-all;
        }

        .result a:hover { text-decoration: underline; }

        .result .url-display {
            font-size: 13px;
            color: #006621;
            margin-top: 2px;
            word-break: break-all;
        }

        .result .snippet {
            font-size: 14px;
            color: #545454;
            margin-top: 4px;
        }

        .result .score {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }

        #pagination {
            display: flex;
            gap: 8px;
            margin-top: 28px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .empty-state {
            color: #999;
            font-size: 14px;
            padding: 40px 0;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CrawlerSE <span>— search engine</span></h1>

    <form id="searchForm">
        <input id="searchBox" type="text" placeholder="Search Wikipedia & Go docs..." autocomplete="off" />
        <button type="submit">Search</button>
    </form>

    <div id="info"></div>
    <div id="results"></div>

    <div id="pagination" style="display:none;">
        <button id="prevBtn">← Previous</button>
        <button id="nextBtn">Next →</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
